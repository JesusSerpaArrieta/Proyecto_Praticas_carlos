services:
  - type: web
    name: las-togas-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: las-togas-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@rental.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: las-togas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: las-togas-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /api/*
        destination: https://las-togas-backend.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: las-togas-db
    databaseName: rental_management
    user: postgres
    plan: free
