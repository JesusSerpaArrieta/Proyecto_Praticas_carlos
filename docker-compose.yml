services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rental_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build: ./backend
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rental_management
      DB_SSL: "false"
      JWT_SECRET: "change_this_in_production"
      PORT: 3000
      ADMIN_EMAIL: "admin@rental.com"
      ADMIN_PASSWORD: "Admin123!"
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
